data:
  source: "yfinance"
  adjusted: true
  bar_type: "daily"
  bar_close_utc_hour: 21
  cache_dir: ".cache/bars"
  cache_staleness_hours: 4
  batch_size: 50

backtest:
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  initial_cash: 100000.00
  risk_free_rate: 0.05
  audit_lookahead: false

risk:
  rules:
    # Safety brake first — RISK_ENGINE.md §5 recommended ordering
    - rule: "MaxDrawdownRule"
      max_drawdown_pct: 0.40         # last-resort valve; strategy CBs fire at 20%

    # Rate limit — catches bugs from both strategies simultaneously
    - rule: "DailyOrderLimitRule"
      max_orders_per_day: 70         # 30 exits + 30 entries (momentum) + 10 (mean rev)

    # Long-only enforcement for both strategies
    - rule: "ShortSellingRule"

    # Position cap — applies to intents from BOTH strategies on the same symbol
    # (e.g., both wanting to BUY SPY on the same bar)
    - rule: "PositionSizeRule"
      max_position_pct: 0.08         # max 8% per name

    # Sector cap — prevents momentum from dominating one sector
    - rule: "SectorExposureRule"
      max_sector_pct: 0.25

    # Cash solvency — ensures both strategies' pending buys fit within cash
    - rule: "CashSolvencyRule"
      cash_buffer_pct: 0.01

    # Concentration — total open positions across both strategies
    - rule: "ConcentrationRule"
      max_open_positions: 27         # 25 momentum + 2 mean reversion legs

execution:
  broker: "PaperBroker"
  fill_at: "next_open"
  slippage_model: "fixed_pct"
  slippage_pct: 0.0005
  commission_model: "per_share"
  commission_per_share: 0.005
  min_commission: 1.00

