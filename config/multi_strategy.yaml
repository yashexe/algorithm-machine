##############################################################################
#  algorithm-machine | multi_strategy.yaml
#
#  Two concurrent strategies running under a shared RiskGatekeeper:
#
#  1. equity_momentum_v1 — Cross-sectional momentum across large-cap equities
#     (the primary strategy, using best in-sample parameters from WFO)
#
#  2. etf_mean_reversion_v1 — SPY/TLT z-score mean reversion
#     (uncorrelated absolute-return strategy, long-only via BUY the cheap leg)
#
#  The RiskGatekeeper manages capital allocation between both strategies:
#    - PositionSizeRule: caps any single name at 8% of equity
#    - CashSolvencyRule: prevents both strategies from over-drawing cash
#    - ConcentrationRule: limits total open positions
#    - SectorExposureRule: prevents sector over-concentration from momentum
#
#  Conflict resolution (STRATEGY_INTERFACE.md §6):
#    If both strategies emit BUY SPY simultaneously, the gatekeeper evaluates
#    each intent against the same portfolio snapshot. The second intent will see
#    the existing SPY position (from the first approval) in the snapshot and
#    the PositionSizeRule will resize or reject it accordingly.
#
#  Adding TLT to the universe:
#    TLT is added to universe.symbols so DataPipeline fetches its bar history.
#    The equity_momentum strategy ignores TLT (it's not in its symbols list).
##############################################################################

