      max_new_entries: 10
      circuit_breaker_drawdown: 0.20

  # ── Strategy 2: ETF Mean Reversion (SPY / TLT) ───────────────────────
  - id: "etf_mean_reversion_v1"
    class: "strategies.etf_mean_reversion.EtfMeanReversionStrategy"
    symbols:
      - "SPY"
      - "TLT"
    params:
      symbol_a: "SPY"
      symbol_b: "TLT"
      lookback_days: 60              # 60-day rolling z-score window
      entry_z: 1.5                   # enter at 1.5 standard deviations
      exit_z: 0.5                    # exit when reversion reaches 0.5 sigma
      quantity_pct: 0.15             # target 15% of portfolio per leg
      initial_cash: 100000           # must match backtest.initial_cash
      min_vol: 0.001                 # skip if spread is too quiet
