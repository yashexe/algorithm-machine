data:
  source: "yfinance"
  adjusted: true
  bar_type: "daily"
  bar_close_utc_hour: 21
  cache_dir: ".cache/bars"
  cache_staleness_hours: 4
  batch_size: 50

backtest:
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  holdout_start: "2024-01-01"
  initial_cash: 100000.00
  risk_free_rate: 0.05
  audit_lookahead: false

risk:
  rules:
    - rule: "MaxDrawdownRule"
      max_drawdown_pct: 0.40
    - rule: "DailyOrderLimitRule"
      max_orders_per_day: 40         # 10 entries + up to 10 exits + buffer
    - rule: "ShortSellingRule"
    - rule: "PositionSizeRule"
      max_position_pct: 0.15         # hard cap; strategy targets 10% per position
    - rule: "CashSolvencyRule"
      cash_buffer_pct: 0.01
    - rule: "ConcentrationRule"
      max_open_positions: 10

execution:
  broker: "PaperBroker"
  fill_at: "next_open"
  slippage_model: "fixed_pct"
  slippage_pct: 0.0005
  commission_model: "per_share"
  commission_per_share: 0.005
  min_commission: 1.00
  max_participation_pct: 0.025

