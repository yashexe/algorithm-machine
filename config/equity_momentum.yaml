    params:
      momentum_lookback: 252        # 12-month return window
      skip_recent_days: 20          # skip last month to reduce reversal noise
      min_lookback: 200             # min bars for a symbol to be ranked
      top_n: 20                     # hold top 20 names
      rank_exit_buffer: 5           # exit if rank falls below top 25
      ma_period: 200                # 200-day MA for regime + per-stock exit
      regime_symbol: "SPY"          # bear-market filter trigger
      vol_target_pct: 0.003         # 0.3% daily vol contribution per position
      min_volume_30d: 500000        # reject illiquid names (< 500k avg daily vol)
      max_daily_move_pct: 0.15      # reject gap-risk names (any 30-day move > 15%)
      rebalance_freq: "weekly"
      initial_cash: 100000          # must match backtest.initial_cash for vol sizing
      max_new_entries: 10           # turnover cap: max 10 new buys per rebalance
      circuit_breaker_drawdown: 0.20  # liquidate all holdings if drawdown >= 20%

wfo_grid:
  vol_target_pct: [0.001, 0.002, 0.003, 0.005]
  top_n: [10, 15, 20]
  ma_period: [150, 200, 250]
