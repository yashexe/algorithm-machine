data:
  source: "yfinance"
  adjusted: true
  bar_type: "daily"
  bar_close_utc_hour: 21
  cache_dir: ".cache/bars"
  cache_staleness_hours: 4
  batch_size: 50

backtest:
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  holdout_start: "2024-01-01"   # reserved for final evaluation — WFO stops at 2023-12-31
  initial_cash: 100000.00
  risk_free_rate: 0.05
  audit_lookahead: false

risk:
  rules:
    - rule: "MaxDrawdownRule"
      max_drawdown_pct: 0.40            # last-resort safety valve; strategy CB at 20% is the primary control
    - rule: "DailyOrderLimitRule"
      max_orders_per_day: 60            # up to ~30 exits + 30 entries on rebalance day
    - rule: "ShortSellingRule"          # long-only enforcement
    - rule: "PositionSizeRule"
      max_position_pct: 0.08            # max 8% per name → ~12 full positions per $100k
    - rule: "SectorExposureRule"
      max_sector_pct: 0.25              # max 25% in any single GICS sector
    - rule: "CashSolvencyRule"
      cash_buffer_pct: 0.01             # 1% buffer: absorbs next-open gap-up slippage
    - rule: "ConcentrationRule"
      max_open_positions: 25            # hard cap on simultaneous open positions

execution:
  broker: "PaperBroker"
  fill_at: "next_open"
  slippage_model: "fixed_pct"
  slippage_pct: 0.0005
  commission_model: "per_share"
  commission_per_share: 0.005
  min_commission: 1.00
  max_participation_pct: 0.025

